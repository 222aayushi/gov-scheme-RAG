<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Farmer Profile</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#f4f9f4;
display:flex;
justify-content:center;
align-items:center;
padding:30px;
min-height:100vh;
}

/* ✅ MAIN RECTANGLE CARD */
.profile-card{
width: 100%;
max-width: 1000px;   /* 👈 makes it wide rectangle */
background:white;
border-radius:25px;
padding:30px 35px;
box-shadow:0 10px 30px rgba(0,0,0,0.08);
border:1px solid #e5e5e5;
}

/* HEADER */
.profile-header{
display:flex;
align-items:center;
margin-bottom:25px;
}

.profile-title{
display:flex;
align-items:center;
gap:15px;
}

.avatar{
width:60px;
height:60px;
border-radius:50%;
background:linear-gradient(135deg,#2E7D32,#66BB6A);
display:flex;
justify-content:center;
align-items:center;
font-size:28px;
color:white;
}

.profile-title h2{
color:#2E7D32;
font-size:24px;
}

.profile-title p{
font-size:12px;
color:#777;
}

/* ✅ GRID LAYOUT (KEY FIX) */
.profile-details{
display:grid;
grid-template-columns: repeat(2, 1fr); /* 👈 2 columns */
gap:15px 20px;
}

/* FIELD BOX */
.detail{
background:#f8faf8;
padding:12px;
border-radius:16px;
transition:0.3s;
}

.detail:hover{
background:#E8F5E9;
}

.label{
display:block;
margin-bottom:8px;
font-size:13px;
font-weight:500;
color:#555;
}

.input-field{
width:100%;
padding:10px 12px;
border:1px solid #dcdcdc;
border-radius:10px;
outline:none;
font-size:14px;
transition:.3s;
}

.input-field:focus{
border-color:#2E7D32;
box-shadow:0 0 8px rgba(46,125,50,.2);
}

/* BUTTON */
.save-btn{
width:100%;
margin-top:20px;
padding:14px;
background:#2E7D32;
color:white;
border:none;
border-radius:12px;
font-size:16px;
font-weight:600;
cursor:pointer;
transition:.3s;
grid-column: span 2; /* 👈 full width button */
}

.save-btn:hover{
background:#256628;
}

/* FOOTER */
.footer-box{
margin-top:15px;
background:#E8F5E9;
padding:14px;
border-radius:14px;
text-align:center;
color:#2E7D32;
font-weight:500;
grid-column: span 2;
}

@media (max-width: 768px){
.profile-details{
grid-template-columns: 1fr; /* mobile view */
}
.save-btn, .footer-box{
grid-column: span 1;
}
}

</style>
</head>

<body>

<div class="profile-card">

<div class="profile-header">

<div class="profile-title">

<div class="avatar">👨‍🌾</div>

<div>
<h2>Farmer Profile</h2>
<p>Personalized Recommendations</p>
</div>

</div>

</div>

<div class="profile-details">

<div class="detail">
<label class="label">👤 Name</label>
<input type="text" class="input-field" placeholder="Enter your full name">
</div>

<div class="detail">
<label class="label">📍 State</label>
<input type="text" class="input-field" placeholder="Enter your state">
</div>

<div class="detail">
<label class="label">🏙 District</label>
<input type="text" class="input-field" placeholder="Enter your district">
</div>

<div class="detail">
<label class="label">🌱 Crop Type</label>
<input type="text" class="input-field" placeholder="Enter crop type">
</div>

<div class="detail">
<label class="label">📏 Land Size</label>
<input type="text" class="input-field" placeholder="Enter land size (acres)">
</div>

<div class="detail">
<label class="label">🧪 Soil Type</label>
<input type="text" class="input-field" placeholder="Enter soil type">
</div>

<div class="detail">
<label class="label">🚜 Farming Experience</label>
<input type="text" class="input-field" placeholder="Years of experience">
</div>

<div class="detail">
<label class="label">🌐 Preferred Language</label>
<input type="text" class="input-field" placeholder="English / Hindi / Marathi">
</div>

<button class="save-btn" onclick="saveDetails()">💾 Save Details</button>

<div class="footer-box">
✅ Profile helps us find the most relevant schemes for you.
</div>

</div>

</div>

</body>
</html>
